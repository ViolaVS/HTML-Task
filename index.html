<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="/css/style.css"
    />
    <title>Portfolio</title>
  </head>
  <body>
    <header class="header">
      <div class="burger">
        <svg
          viewBox="0 0 488 488"
          id="burger-menu"
        >
          <path
            d="M64.192,108.444h359.617c29.943,0,54.223-24.278,54.223-54.222C478.031,24.278,453.754,0,423.809,0H64.192C34.248,0,9.969,24.278,9.969,54.222C9.969,84.166,34.248,108.444,64.192,108.444z"
          />
          <path
            d="M423.809,189.778H64.192c-29.944,0-54.223,24.278-54.223,54.222c0,29.943,24.278,54.223,54.223,54.223h359.617c29.945,0,54.223-24.279,54.223-54.223C478.031,214.056,453.754,189.778,423.809,189.778z"
          />
          <path
            d="M423.809,379.557H64.192c-29.944,0-54.223,24.277-54.223,54.222C9.969,463.722,34.248,488,64.192,488h359.617c29.945,0,54.223-24.278,54.223-54.222C478.031,403.834,453.754,379.557,423.809,379.557z"
          />
        </svg>
      </div>
      <nav class="side-menu hidden">
        <div class="burger-close">×</div>
        <img
          src="./assets/burger.jpg"
          alt="img"
          class="side-menu__img"
        />
        <!-- <div class="side-menu__img"></div> -->
        <ul class="side-menu__list nav-list">
          <li class="side-menu__item">
            <a
              class="side-menu__link link"
              href="#"
              id="clients"
            >
              Clients
            </a>
          </li>
          <li class="side-menu__item">
            <a
              class="side-menu__link link"
              href="#"
              id="products"
            >
              Products
            </a>
          </li>
          <li class="side-menu__item">
            <a
              class="side-menu__link link"
              href="#"
              id="feedback"
            >
              Feedback
            </a>
          </li>
        </ul>
      </nav>
      <h1 class="header__title">Let Make Something Great</h1>
      <p class="header__text">
        Lorem ipsum dolor sit amet consectetur adipisicing eli. Velit, incidunt?
      </p>
    </header>
    <main class="portfolio">
      <div class="portfolio__content">
        <h2 class="portfolio__title">Portfolio</h2>
        <nav class="portfolio__nav">
          <ul class="portfolio__list nav-list">
            <li class="portfolio__item">
              <a
                class="portfolio__link link"
                href="#"
                id="clients"
              >
                Clients
              </a>
            </li>
            <li class="portfolio__item">
              <a
                class="portfolio__link link"
                href="#"
                id="products"
              >
                Products
              </a>
            </li>
            <li class="portfolio__item">
              <a
                class="portfolio__link link"
                href="#"
                id="feedback"
              >
                Feedback
              </a>
            </li>
          </ul>
        </nav>
        <div class="portfolio__library"></div>
      </div>
      <form
        method="post"
        class="portfolio__form"
      >
        <h2 class="form__title text-uppercase">I want to get fresh updates</h2>
        <label
          for="name"
          class="input-label text-uppercase"
        >
          Fisrt name:
        </label>
        <input
          id="name"
          type="text"
          class="input"
          name="name"
          autocomplete="name"
        />
        <span class="name-error error"></span>
        <label
          for="email"
          class="input-label text-uppercase"
        >
          Email
        </label>
        <input
          id="email"
          type="email"
          class="input"
          autocomplete="email"
        />
        <span class="email-error error"></span>
        <label class="input-label">
          <input
            type="checkbox"
            name="checkbox"
            id="checkbox"
          />
          I consent to processing of personal data
        </label>

        <span class="checkbox-error error"></span>
        <button
          type="submit"
          class="button"
        >
          Subscribe
        </button>
      </form>
    </main>
    <footer>All right reserved 2026</footer>
    <div
      id="overlay"
      class="overlay hidden"
    ></div>
    <div
      id="error-modal"
      class="modal error-modal hidden"
    >
      <div class="close">×</div>
      <div id="modalText">Error fetching data.TypeError:Failed to fetch.</div>
    </div>
    <div
      id="form-modal"
      class="modal form-modal hidden"
    >
      <div class="close">×</div>
      <div id="form-modal-text"></div>
    </div>
    <script
      type="module"
      src="./js/app.js"
    ></script>
  </body>
</html>
